<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Notepad Pro</title>
        <style>
            :root {
                --bg: #282a36;
                --navbar: #191a21;
                --panel: #44475a;
                --accent: #bd93f9;
                --text: #f8f8f2;
                --green: #50fa7b;
            }

            body,
            html {
                margin: 0;
                padding: 0;
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-size: 18px;
                font-family: 'Inter', sans-serif;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .navbar {
                height: 45px;
                background: var(--navbar);
                display: flex;
                align-items: center;
                padding: 0 15px;
                justify-content: space-between;
                border-bottom: 1px solid #000;
                z-index: 100;
                flex-shrink: 0;
            }

            #tab-bar {
                display: flex;
                align-items: flex-end;
                background: var(--navbar);
                border-bottom: 2px solid #000;
                overflow-x: auto;
                height: 34px;
                padding: 0 8px;
                gap: 2px;
                flex-shrink: 0;
                scrollbar-width: none;
            }

            #tab-bar::-webkit-scrollbar {
                display: none;
            }

            .tab {
                display: flex;
                align-items: center;
                padding: 5px 10px 5px 12px;
                background: #1e1f2b;
                border-radius: 6px 6px 0 0;
                cursor: pointer;
                font-size: 13px;
                gap: 6px;
                min-width: 70px;
                max-width: 180px;
                white-space: nowrap;
                color: #6272a4;
                border: 1px solid #000;
                border-bottom: none;
                transition: background 0.1s, color 0.1s;
                user-select: none;
                height: 27px;
                box-sizing: border-box;
            }

            .tab.active {
                background: var(--bg);
                color: var(--text);
                border-color: #3a3c4e;
            }

            .tab.dragging {
                opacity: 0.4;
            }

            .tab.drag-over {
                cursor: grabbing;
            }

            .tab:hover:not(.active) {
                background: #2c2e3f;
                color: #aaa;
            }

            .tab-title {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .tab-close {
                color: #6272a4;
                font-size: 14px;
                line-height: 1;
                cursor: pointer;
                padding: 0 2px;
                border-radius: 3px;
                flex-shrink: 0;
            }

            .tab-close:hover {
                color: #ff5555;
                background: rgba(255, 85, 85, 0.15);
            }

            .tab-title-input {
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--accent);
                color: var(--text);
                font-size: 13px;
                width: 110px;
                outline: none;
                font-family: inherit;
                padding: 0;
            }

            .tab-new {
                padding: 0 8px;
                background: transparent;
                border: 1px solid #3a3c4e;
                border-radius: 4px;
                color: #6272a4;
                cursor: pointer;
                font-size: 18px;
                line-height: 1;
                height: 22px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-left: 4px;
                margin-bottom: 4px;
                flex-shrink: 0;
            }

            .tab-new:hover {
                color: var(--accent);
                border-color: var(--accent);
            }

            #editor-container {
                flex: 1;
                position: relative;
                overflow: hidden;
            }

            #console-drawer {
                height: 0;
                background: #111;
                border-top: 2px solid var(--accent);
                transition: height 0.3s ease;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
            }

            #console-drawer.open {
                height: 30%;
            }

            #console-header {
                padding: 5px 15px;
                font-size: 16px;
                background: #1d1d1d;
                color: var(--accent);
                display: flex;
                justify-content: space-between;
            }

            #console-output {
                flex: 1;
                padding: 10px;
                font-family: 'Fira Code', monospace;
                font-size: 14px;
                color: var(--green);
                overflow-y: auto;
                white-space: pre-wrap;
            }

            .cm-editor {
                height: 100% !important;
            }

            .cm-content {
                white-space: pre-wrap !important;
                word-break: break-word !important;
            }
        </style>
    </head>
    <body>
        <div class="navbar">
            <div>
                <span id="mode-indicator" style="font-size: 12px; color: #6272a4; font-weight: 600;">TEXT</span>
                <span style="font-size: 12px; color: #6272a4;"> | Alt+Enter: Run | Ctrl+S: Download | Ctrl+Shift+F: Format | Ctrl+Z: Restore tab | Dbl-click tab to rename (.js → JS mode) | Drag tabs to reorder</span>
            </div>
            <div id="save-indicator" style="font-size: 12px; opacity: 0.5;">Ready</div>
        </div>
        <div id="tab-bar"></div>
        <div id="editor-container"></div>
        <div id="console-drawer">
            <div id="console-header">
                <span>CONSOLE OUTPUT</span>
                <div>
                    <span onclick="clearConsole()" style="cursor:pointer; margin-right: 20px;">[Clear]</span>
                    <span onclick="toggleConsole()" style="cursor:pointer">[Close]</span>
                </div>
            </div>
            <div id="console-output"></div>
        </div>
        <script type="module">
            import { EditorView, basicSetup } from "https://esm.sh/codemirror";
            import { Compartment } from "https://esm.sh/@codemirror/state";
            import { javascript } from "https://esm.sh/@codemirror/lang-javascript";
            import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark";
            import { keymap } from "https://esm.sh/@codemirror/view";
            import { indentWithTab } from "https://esm.sh/@codemirror/commands";
            import { indentUnit } from "https://esm.sh/@codemirror/language";
            import { searchKeymap } from "https://esm.sh/@codemirror/search";
            import prettier from "https://esm.sh/prettier@3.0.3/standalone";
            import parserBabel from "https://esm.sh/prettier@3.0.3/plugins/babel";
            import parserEstree from "https://esm.sh/prettier@3.0.3/plugins/estree";

            const outputEl = document.getElementById('console-output');
            const drawer = document.getElementById('console-drawer');
            const indicator = document.getElementById('save-indicator');

            // --- Language Mode ---
            // Default is plaintext; switch to JS only when the tab name ends with .js
            const languageConf = new Compartment();

            function langExtFor(title) {
                return (title || '').toLowerCase().endsWith('.js') ? javascript() : [];
            }

            function updateModeIndicator(title) {
                const isJs = (title || '').toLowerCase().endsWith('.js');
                const el = document.getElementById('mode-indicator');
                el.textContent = isJs ? 'JS' : 'TEXT';
                el.style.color = isJs ? 'var(--green)' : '#6272a4';
            }

            function applyLanguage(title) {
                view.dispatch({ effects: languageConf.reconfigure(langExtFor(title)) });
                updateModeIndicator(title);
            }

            // --- Tab State ---
            let tabs = [];
            let activeTabId = null;
            let closedTabsHistory = [];

            function genId() {
                return 'tab-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
            }

            function loadState() {
                const saved = localStorage.getItem('npad-tabs');
                if (saved) {
                    try {
                        const state = JSON.parse(saved);
                        tabs = state.tabs || [];
                        activeTabId = state.activeTabId;
                        // Validate activeTabId still exists
                        if (!tabs.find(t => t.id === activeTabId)) {
                            activeTabId = tabs[0]?.id ?? null;
                        }
                    } catch (_) {}
                }
                if (tabs.length === 0) {
                    // Migrate from old single-tab storage
                    const oldContent = localStorage.getItem('notepadContent') || '';
                    const id = genId();
                    tabs = [{ id, title: 'Note 1', content: oldContent }];
                    activeTabId = id;
                }
            }

            function saveState() {
                localStorage.setItem('npad-tabs', JSON.stringify({ tabs, activeTabId }));
            }

            function getActiveTab() {
                return tabs.find(t => t.id === activeTabId) ?? null;
            }

            // --- Tab Drag Reordering ---
            function getDragAfterElement(bar, x) {
                const els = [...bar.querySelectorAll('.tab:not(.dragging)')];
                let closest = { offset: -Infinity, element: null };
                for (const child of els) {
                    const box = child.getBoundingClientRect();
                    const offset = x - box.left - box.width / 2;
                    if (offset < 0 && offset > closest.offset) {
                        closest = { offset, element: child };
                    }
                }
                return closest.element;
            }

            function commitTabOrder() {
                const bar = document.getElementById('tab-bar');
                const order = [...bar.querySelectorAll('.tab')].map(el => el.dataset.id);
                tabs.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
                saveState();
            }

            function setupTabDragging() {
                const bar = document.getElementById('tab-bar');
                bar.addEventListener('dragover', (e) => {
                    const dragging = bar.querySelector('.tab.dragging');
                    if (!dragging) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const after = getDragAfterElement(bar, e.clientX);
                    const newBtn = bar.querySelector('.tab-new');
                    if (after == null) {
                        bar.insertBefore(dragging, newBtn);
                    } else {
                        bar.insertBefore(dragging, after);
                    }
                });
                bar.addEventListener('drop', (e) => e.preventDefault());
            }

            function renderTabs() {
                const bar = document.getElementById('tab-bar');
                bar.innerHTML = '';

                for (const tab of tabs) {
                    const el = document.createElement('div');
                    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
                    el.dataset.id = tab.id;
                    el.draggable = true;
                    el.addEventListener('click', () => switchTab(tab.id));

                    el.addEventListener('dragstart', (e) => {
                        el.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', tab.id);
                    });
                    el.addEventListener('dragend', () => {
                        el.classList.remove('dragging');
                        commitTabOrder();
                        renderTabs();
                    });

                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'tab-title';
                    titleSpan.textContent = tab.title;
                    titleSpan.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        startEditTitle(tab.id, titleSpan);
                    });

                    el.appendChild(titleSpan);

                    if (tabs.length > 1) {
                        const closeBtn = document.createElement('span');
                        closeBtn.className = 'tab-close';
                        closeBtn.textContent = '×';
                        closeBtn.title = 'Close tab';
                        closeBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            closeTab(tab.id);
                        });
                        el.appendChild(closeBtn);
                    }

                    bar.appendChild(el);
                }

                const newBtn = document.createElement('button');
                newBtn.className = 'tab-new';
                newBtn.textContent = '+';
                newBtn.title = 'New tab';
                newBtn.addEventListener('click', createTab);
                bar.appendChild(newBtn);
            }

            function startEditTitle(id, titleSpan) {
                const tab = tabs.find(t => t.id === id);
                if (!tab) return;

                // Disable dragging while editing so text can be selected in the input
                const tabEl = titleSpan.closest('.tab');
                if (tabEl) tabEl.draggable = false;

                const input = document.createElement('input');
                input.className = 'tab-title-input';
                input.value = tab.title;
                titleSpan.replaceWith(input);
                input.focus();
                input.select();

                const commit = () => {
                    const newTitle = input.value.trim() || tab.title;
                    tab.title = newTitle;
                    saveState();
                    // Renaming the active tab may flip its language mode (.js ⇄ plaintext)
                    if (tab.id === activeTabId) applyLanguage(newTitle);
                    renderTabs();
                };

                input.addEventListener('blur', commit);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
                    if (e.key === 'Escape') { input.value = tab.title; input.blur(); }
                    e.stopPropagation();
                });
            }

            function flushActiveContent() {
                const tab = getActiveTab();
                if (tab) tab.content = view.state.doc.toString();
            }

            function switchTab(id) {
                if (id === activeTabId) return;
                flushActiveContent();
                activeTabId = id;
                const tab = getActiveTab();
                view.dispatch({
                    changes: { from: 0, to: view.state.doc.length, insert: tab.content }
                });
                applyLanguage(tab.title);
                saveState();
                renderTabs();
                view.focus();
            }

            function createTab() {
                flushActiveContent();
                const id = genId();
                const title = 'Note ' + (tabs.length + 1);
                tabs.push({ id, title, content: '' });
                activeTabId = id;
                view.dispatch({
                    changes: { from: 0, to: view.state.doc.length, insert: '' }
                });
                applyLanguage(title);
                saveState();
                renderTabs();
                view.focus();
            }

            function restoreLastClosedTab() {
                if (closedTabsHistory.length === 0) return;
                flushActiveContent();
                const { tab, idx } = closedTabsHistory.pop();
                const insertAt = Math.min(idx, tabs.length);
                tabs.splice(insertAt, 0, tab);
                activeTabId = tab.id;
                view.dispatch({
                    changes: { from: 0, to: view.state.doc.length, insert: tab.content }
                });
                applyLanguage(tab.title);
                saveState();
                renderTabs();
                view.focus();
            }

            function closeTab(id) {
                if (tabs.length === 1) return;
                const idx = tabs.findIndex(t => t.id === id);
                if (idx === -1) return;
                flushActiveContent();
                closedTabsHistory.push({ tab: { ...tabs[idx] }, idx });
                const wasActive = activeTabId === id;
                tabs.splice(idx, 1);
                if (wasActive) {
                    const next = tabs[Math.min(idx, tabs.length - 1)];
                    activeTabId = next.id;
                    view.dispatch({
                        changes: { from: 0, to: view.state.doc.length, insert: next.content }
                    });
                    applyLanguage(next.title);
                }
                saveState();
                renderTabs();
                if (wasActive) view.focus();
            }

            // --- Debounce Save ---
            let saveTimeout;
            const debouncedSave = (content) => {
                indicator.innerText = "⏳ Typing...";
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    const tab = getActiveTab();
                    if (tab) tab.content = content;
                    saveState();
                    indicator.innerText = "✅ Saved";
                }, 1000);
            };

            // --- Console ---
            const logToConsole = (...args) => {
                const formatted = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg, null, 2) : arg).join(' ');
                outputEl.innerText += `\n> ${formatted}`;
                outputEl.scrollTop = outputEl.scrollHeight;
            };

            window.runCode = () => {
                if (!drawer.classList.contains('open')) toggleConsole();
                const code = view.state.doc.toString();
                const wrappedCode = `(async () => {
                const console = { log: (...args) => window.parentLog(...args) };
                try { ${code} } catch(e) { console.log('Error: ' + e.message) }
            })()`;
                window.parentLog = logToConsole;
                new Function(wrappedCode)();
            };

            window.toggleConsole = () => {
                drawer.classList.toggle('open');
                setTimeout(() => view.focus(), 350);
            };

            window.clearConsole = () => {
                outputEl.innerText = "";
            };

            // --- Editor Setup ---
            loadState();
            const initialTab = getActiveTab();
            const initialContent = initialTab?.content ?? '';
            const initialTitle = initialTab?.title ?? '';

            const view = new EditorView({
                doc: initialContent,
                extensions: [
                    basicSetup,
                    languageConf.of(langExtFor(initialTitle)),
                    oneDark,
                    EditorView.lineWrapping,
                    indentUnit.of("    "),
                    keymap.of([
                        ...searchKeymap,
                        indentWithTab
                    ]),
                    EditorView.updateListener.of((update) => {
                        if (update.docChanged) {
                            debouncedSave(update.state.doc.toString());
                        }
                    })
                ],
                parent: document.getElementById('editor-container')
            });

            updateModeIndicator(initialTitle);
            renderTabs();
            setupTabDragging();

            // --- Formatting ---
            window.formatCode = async () => {
                const currentCode = view.state.doc.toString();
                try {
                    const formatted = await prettier.format(currentCode, {
                        parser: "babel",
                        plugins: [parserBabel, parserEstree],
                        semi: true,
                        singleQuote: true,
                        tabWidth: 4,
                    });
                    view.dispatch({
                        changes: { from: 0, to: view.state.doc.length, insert: formatted }
                    });
                    indicator.innerText = "✨ Formatted";
                } catch (err) {
                    logToConsole("Format Error: " + err.message);
                }
            };

            view.focus();

            // --- Shortcuts ---
            // Capture phase so we intercept Ctrl+Z before CodeMirror's undo handler
            window.addEventListener('keydown', (e) => {
                if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key === 'z' && closedTabsHistory.length > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    restoreLastClosedTab();
                }
            }, { capture: true });

            window.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === '`') {
                    e.preventDefault();
                    toggleConsole();
                }

                if (e.altKey && e.key === 'Backspace') {
                    e.preventDefault();
                    clearConsole();
                }

                if (e.altKey && e.key === 'Enter') {
                    e.preventDefault();
                    runCode();
                }

                if (e.ctrlKey && !e.shiftKey && e.key === 's') {
                    e.preventDefault();
                    const tab = getActiveTab();
                    const defaultName = tab ? tab.title : (() => {
                        const now = new Date();
                        const dd = String(now.getDate()).padStart(2, '0');
                        const mm = String(now.getMonth() + 1).padStart(2, '0');
                        const yy = String(now.getFullYear()).slice(-2);
                        return `${dd}-${mm}-${yy}`;
                    })();
                    const fileName = prompt("Enter filename:", defaultName + '.txt');
                    if (fileName) {
                        const blob = new Blob([view.state.doc.toString()], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.download = fileName.includes('.') ? fileName : fileName + '.txt';
                        a.href = url;
                        a.click();
                        URL.revokeObjectURL(url);
                    }
                }

                if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'f') {
                    e.preventDefault();
                    formatCode();
                }
            });

            window.view = view;
        </script>
    </body>
</html>
